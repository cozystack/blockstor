version: "2"

linters:
  default: all
  disable:
    - depguard
    - exhaustruct
    - gochecknoinits
    - wsl
    - lll
    - errchkjson
    - ireturn
    - gocheckcompilerdirectives
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - unnamedResult
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    funlen:
      lines: 60
      statements: 60
    gocyclo:
      min-complexity: 15
    cyclop:
      max-complexity: 15
    mnd:
      ignored-numbers:
        - "10"
        - "100"
        - "1000"
        - "2"
        - "60"
        - "60.0"
        - "64"
        - "500"
    gomoddirectives:
      replace-allow-list:
        - github.com/cloudflare/cloudflared
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    varnamelen:
      max-distance: 5
      min-name-length: 3
      check-receiver: false
      check-return: false
      ignore-type-assert-ok: false
      ignore-map-index-ok: false
      ignore-chan-recv-ok: false
      ignore-decls:
        - wg sync.WaitGroup
        - wg *sync.WaitGroup
        - mu sync.Mutex
        - ok bool
      ignore-names:
        - i
        - w
        - r
        - b
        - c
        - m
        - n
        - in
        - sp
        - st
        - s
        - rd
        - vd
        - rg
        - vg
        - tt
        - rw
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples/
      - generated\.go$
    rules:
      - linters:
          - funlen
          - dupl
          - gocognit
          - gocyclo
          - cyclop
          - errcheck
          - testableexamples
          - testpackage
          - forcetypeassert
          - gocritic
          - nlreturn
          - wsl_v5
          - varnamelen
          - unparam
          - modernize
          - gosec
          - testifylint
          - perfsprint
          - paralleltest
          - maintidx
          - goconst
          - noinlineerr
        path: _test\.go
      # k8s store implementations follow the same Get/Create/Update/Delete
      # template per resource — duplication is the point and is shared via
      # the storetest suite already.
      - linters:
          - dupl
        path: pkg/store/k8s/
      # Same applies to the in-memory store implementations.
      - linters:
          - dupl
        path: pkg/store/inmemory_
      # REST handlers follow the same Get/Create/Update/Delete shape per
      # resource for the same reason.
      - linters:
          - dupl
        path: pkg/rest/
      # storetest is a shared test suite imported by both InMemory and k8s
      # store tests. It contains test code, just not in _test.go files, so
      # the same exclusions apply.
      - linters:
          - funlen
          - dupl
          - gocognit
          - gocyclo
          - cyclop
          - gocritic
          - nlreturn
          - wsl_v5
          - varnamelen
          - goconst
          - noinlineerr
          - thelper
        path: pkg/store/storetest/
      - linters:
          - forbidigo
          - gocyclo
          - cyclop
          - goconst
          - funlen
          - gocognit
          - nestif
          - gocritic
          - maintidx
        path: examples/
      # Controller patterns - helper methods near reconcile logic
      - linters:
          - funcorder
        path: internal/controller/
      # Controller patterns - inline error handling in reconcile
      - linters:
          - noinlineerr
        path: internal/controller/
      # blockstor reproduces the LINSTOR REST API contract, which uses
      # snake_case JSON. Keep golinstor-compatible names verbatim.
      - linters:
          - tagliatelle
        path: pkg/api/
      # cmd/main.go is the kubebuilder manager scaffold — don't lint its
      # boilerplate (TODOs, function length, globals, inline err checks, wsl).
      - linters:
          - funlen
          - gochecknoglobals
          - godox
          - gocritic
          - noinlineerr
          - wsl_v5
          - cyclop
          - gocyclo
        path: cmd/main.go
      # api/v1alpha1 and internal/controller are kubebuilder scaffold; the
      # boilerplate (dot-imports for ginkgo/gomega, generated DeepCopy globals,
      # ginkgo BeforeSuite TODOs, wrapcheck on framework returns) is not
      # something we should fight.
      - linters:
          - gochecknoglobals
          - godot
          - godox
          - revive
          - wrapcheck
          - embeddedstructfieldcheck
          - fatcontext
          - varnamelen
        path: api/v1alpha1/
      - linters:
          - gochecknoglobals
          - godot
          - godox
          - revive
          - wrapcheck
          - embeddedstructfieldcheck
          - fatcontext
          - varnamelen
        path: internal/controller/
      # test/ is kubebuilder-generated e2e helpers; same scaffolding boilerplate.
      - linters:
          - gochecknoglobals
          - godot
          - godox
          - revive
          - wrapcheck
          - err113
          - gocritic
          - nlreturn
          - noctx
          - noinlineerr
          - nolintlint
          - wsl_v5
          - varnamelen
          - mnd
        path: test/
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples/
      - generated\.go$
      - test/utils/
