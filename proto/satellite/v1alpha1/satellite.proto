syntax = "proto3";

package blockstor.satellite.v1alpha1;

option go_package = "github.com/cozystack/blockstor/pkg/satellite/proto;satellitepb";

// Satellite is the controller-side view of a single satellite agent. The
// agent runs on every storage node, owns the DRBD/LVM/ZFS state of that
// node, and reports observed state back over a stream.
//
// The contract is intentionally narrow: the controller asks the satellite
// to bring the node to a desired state ("apply this resource set") and the
// satellite reports back asynchronously. There is no "fire and forget"
// command channel — every operation is idempotent and reconcile-driven.
// Controller is the gRPC service the controller exposes; satellites are
// the clients. RPCs in this service are always satellite→controller.
service Controller {
  // Hello is the satellite registration handshake. The satellite sends its
  // identity and capabilities; the controller replies with the cluster
  // identity it should expect.
  rpc Hello(HelloRequest) returns (HelloResponse) {}

  // ReportObserved lets the satellite push observed-state updates back to
  // the controller. The controller reads them and updates the matching
  // Resource CRD's status. Client-streaming so satellites can send a
  // continuous flow of events without re-connecting on every change.
  rpc ReportObserved(stream ResourceObservedEvent)
      returns (ReportObservedResponse) {}

  // ReportPoolCapacity is the periodic capacity-update push: satellite
  // walks each Provider, runs PoolStatus, and ships free/total bytes
  // back so /v1/view/storage-pools surfaces live numbers (linstor-csi
  // GetCapacity, autoplacer free-space ranking).
  rpc ReportPoolCapacity(ReportPoolCapacityRequest) returns (ReportPoolCapacityResponse) {}
}

// Satellite is the gRPC service the satellite agent exposes; the
// controller is the client. RPCs here are always controller→satellite —
// the controller pushes desired state and ad-hoc commands.
service Satellite {
  // ApplyResources is the central reconcile RPC. The controller sends the
  // full set of resources that should live on this node; the satellite
  // brings local state in line with that set (creates new ones, removes
  // ones not in the set, fixes drift).
  rpc ApplyResources(ApplyResourcesRequest) returns (ApplyResourcesResponse) {}

  // ApplyStoragePools mirrors ApplyResources for storage pools.
  rpc ApplyStoragePools(ApplyStoragePoolsRequest)
      returns (ApplyStoragePoolsResponse) {}

  // DeleteResource tears the resource down on this satellite:
  // drbdadm down → DeleteVolume → remove .res file. Idempotent on
  // missing.
  rpc DeleteResource(DeleteResourceRequest) returns (DeleteResourceResponse) {}

  // CreateSnapshot asks the satellite to take a snapshot of the named
  // resource on this node. Returns once the snapshot is durable on disk.
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse) {}

  // DeleteSnapshot is the dual of CreateSnapshot.
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse) {}

  // ShipSnapshot sends a snapshot from this satellite to a peer satellite
  // for clone / replica-expansion flows. Implemented by `zfs send | zfs recv`
  // for ZFS pools and `thin-send-recv` for LVM-thin pools.
  rpc ShipSnapshot(ShipSnapshotRequest) returns (ShipSnapshotResponse) {}
}

// ----- ack envelopes -----

message ReportObservedResponse {
  int64 received = 1;  // count of events the controller accepted
}

message ReportPoolCapacityRequest {
  string node_name = 1;
  repeated PoolCapacity pools = 2;
}

message PoolCapacity {
  string pool_name = 1;
  int64 free_capacity_kib = 2;
  int64 total_capacity_kib = 3;
  bool supports_snapshots = 4;
}

message ReportPoolCapacityResponse {
  bool ok = 1;
}

message DeleteResourceRequest {
  string name = 1;
  // storage_pool is the pool the resource lived on; the satellite
  // uses it to route DeleteVolume to the right Provider. Optional —
  // an empty pool lets the satellite skip the storage step.
  string storage_pool = 2;
  // volume_numbers is the set of DesiredVolume.volume_number values
  // the resource owned. Required for non-DISKLESS deletes so the
  // satellite knows which LVs / loopfiles to drop.
  repeated int32 volume_numbers = 3;
}

message DeleteResourceResponse {
  bool ok = 1;
  string message = 2;
}

// ----- handshake -----

message HelloRequest {
  string node_name = 1;
  string blockstor_version = 2;
  repeated string layer_kinds = 3;     // e.g. ["DRBD", "STORAGE", "LUKS"]
  repeated string provider_kinds = 4;  // e.g. ["LVM", "LVM_THIN", "ZFS", "ZFS_THIN", "FILE"]
  string drbd_version = 5;             // value reported by `drbdadm --version`
  // satellite_endpoint is the host:port the controller should dial to
  // push ApplyResources / snapshot RPCs back at this satellite. Empty
  // when the satellite isn't hosting its own gRPC server.
  string satellite_endpoint = 6;
  // pools are the local storage providers this satellite has been
  // configured with (by CLI flag / env). The controller upserts a
  // StoragePool CRD for each so /v1/view/storage-pools reflects them.
  repeated SatellitePool pools = 7;
}

message SatellitePool {
  string name = 1;          // LINSTOR pool name (matches DesiredVolume.storage_pool)
  string provider_kind = 2; // LVM_THIN / ZFS / FILE_THIN / ...
}

message HelloResponse {
  string cluster_id = 1;
  string controller_endpoint = 2;
}

// ----- resource reconcile -----

message ApplyResourcesRequest {
  // The full set this node should own. Anything else gets removed.
  repeated DesiredResource resources = 1;
}

message ApplyResourcesResponse {
  // Per-resource outcome. Errors do not abort the batch — partial success
  // is reported back so the controller can react to per-replica problems.
  repeated ResourceApplyResult results = 1;
}

message DesiredResource {
  string name = 1;             // ResourceDefinition name
  string node_name = 2;
  repeated string flags = 3;   // DISKLESS, EVICTED, ...
  map<string, string> props = 4;
  repeated DesiredVolume volumes = 5;
  repeated string peers = 6;   // node names of replica peers
  // DRBD-layer config (port, secret, peer_slots ...). Free-form for now;
  // we'll concretise as soon as ConfFileBuilder is ported.
  map<string, string> drbd_options = 7;
  // Layer composition for the satellite-side render. ["DRBD","STORAGE"]
  // (default) renders a .res file and runs drbdadm; ["LUKS","STORAGE"]
  // layers cryptsetup over the storage device, no DRBD; ["STORAGE"] is
  // single-replica local mode. Empty == default.
  repeated string layer_stack = 8;
}

message DesiredVolume {
  int32 volume_number = 1;
  int64 size_kib = 2;
  string storage_pool = 3;
}

message ResourceApplyResult {
  string name = 1;
  string node_name = 2;
  bool ok = 3;
  string message = 4;  // populated when !ok
}

// ----- observed-state stream -----

message WatchResourcesRequest {
  string node_name = 1;
  // Resume token; empty on first connect.
  string since = 2;
}

message ResourceObservedEvent {
  string resource_name = 1;
  string node_name = 2;
  bool in_use = 3;
  repeated VolumeObservation volumes = 4;
  string drbd_state = 5;   // UpToDate / Outdated / Diskless / ...
  int64 timestamp_unix = 6;
}

message VolumeObservation {
  int32 volume_number = 1;
  string device_path = 2;
  int64 allocated_kib = 3;
  int64 usable_kib = 4;
  string disk_state = 5;
}

// ----- storage pools -----

message ApplyStoragePoolsRequest {
  repeated DesiredStoragePool pools = 1;
}

message ApplyStoragePoolsResponse {
  repeated StoragePoolApplyResult results = 1;
}

message DesiredStoragePool {
  string name = 1;
  string provider_kind = 2;        // LVM / LVM_THIN / ZFS / ZFS_THIN / FILE / FILE_THIN / DISKLESS
  map<string, string> props = 3;
}

message StoragePoolApplyResult {
  string name = 1;
  bool ok = 2;
  string message = 3;
  int64 free_capacity_kib = 4;
  int64 total_capacity_kib = 5;
  bool supports_snapshots = 6;
}

// ----- snapshots -----

message CreateSnapshotRequest {
  string resource_name = 1;
  string snapshot_name = 2;
  repeated int32 volume_numbers = 3;
}

message CreateSnapshotResponse {
  bool ok = 1;
  string message = 2;
  int64 create_timestamp_unix = 3;
}

message DeleteSnapshotRequest {
  string resource_name = 1;
  string snapshot_name = 2;
}

message DeleteSnapshotResponse {
  bool ok = 1;
  string message = 2;
}

message ShipSnapshotRequest {
  string resource_name = 1;
  string snapshot_name = 2;
  string target_node = 3;
  // Mechanism hint. Empty means "auto" (zfs send|recv for ZFS pools,
  // thin-send-recv for LVM-thin).
  string mechanism = 4;
}

message ShipSnapshotResponse {
  bool ok = 1;
  string message = 2;
  int64 bytes_transferred = 3;
}
