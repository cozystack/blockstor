---
# Standalone apiserver Deployment — the LINSTOR-compatible REST front
# end split out of the controller binary. Three replicas behind a
# Service so linstor-csi / `linstor` CLI / piraeus-operator polling
# spreads across pods, leaving the single-leader controller binary
# free of view-API contention.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blockstor-apiserver
  namespace: blockstor-system
---
# RBAC narrowed compared to the controller's role. The REST
# handlers don't:
#   - update Status (only reconcilers + satellites do, via the
#     /status subresource — apiserver's grep -E
#     '\.(Status\(\)|SetState)' is empty in pkg/rest).
#   - touch /finalizers (only reconcilers add/strip).
#   - emit Events (no reconcile-trigger writes from REST).
#   - need leases (leader election is off — every apiserver
#     replica serves independently).
# What's left is plain CRUD on the blockstor.io CRDs themselves.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: blockstor-apiserver
rules:
  - apiGroups: [blockstor.io.blockstor.io]
    resources: ["*"]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blockstor-apiserver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: blockstor-apiserver
subjects:
  - kind: ServiceAccount
    name: blockstor-apiserver
    namespace: blockstor-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockstor-apiserver
  namespace: blockstor-system
  labels: {app: blockstor-apiserver}
spec:
  # Three replicas keeps reads serving on a per-pod restart while
  # the operator rolls the apiserver image. Reads are stateless;
  # writes go straight through to apiserver with optimistic
  # concurrency on resourceVersion, so two replicas can write
  # concurrently and the apiserver arbitrates.
  replicas: 3
  selector: {matchLabels: {app: blockstor-apiserver}}
  template:
    metadata: {labels: {app: blockstor-apiserver}}
    spec:
      serviceAccountName: blockstor-apiserver
      # Spread replicas across nodes when possible so a single
      # node loss doesn't take all apiserver pods at once.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {app: blockstor-apiserver}
      containers:
        - name: apiserver
          image: __REGISTRY__/blockstor-apiserver:dev
          imagePullPolicy: Always
          args:
            - --rest-bind-address=:3370
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
          env:
            - name: POD_NAMESPACE
              valueFrom: {fieldRef: {fieldPath: metadata.namespace}}
          ports:
            - {name: rest, containerPort: 3370}
            - {name: health, containerPort: 8081}
          readinessProbe:
            tcpSocket: {port: 3370}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: 8081}
            initialDelaySeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            seccompProfile: {type: RuntimeDefault}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
---
# Re-point the existing blockstor-controller Service so callers
# of the merged REST endpoint (linstor-csi, piraeus-operator, the
# `linstor` CLI) keep working — they hit the apiserver pods
# instead of the controller. The :7000 satellite-grpc port stays
# on the controller (retired in Phase 10.6 but the port name is
# retained for compatibility).
apiVersion: v1
kind: Service
metadata:
  name: blockstor-apiserver
  namespace: blockstor-system
spec:
  selector: {app: blockstor-apiserver}
  ports:
    - {name: rest, port: 3370, targetPort: 3370}
