---
# blockstor-satellite DaemonSet for the dev stand. Runs on every
# Talos worker, dials the in-cluster blockstor-controller:7000, and
# (eventually) drives drbdadm + LVM/ZFS reconcile from there.
#
# Privilege footprint mirrors what piraeus-satellite needs:
#   - hostPID  for /proc namespace access by drbdadm / drbdsetup
#   - privileged for /dev/drbd* + LV/zvol opens
#   - hostPath /dev /lib/modules /run/lvm /var/lib/blockstor-satellite
#
# We don't yet replace the piraeus satellite. This DaemonSet runs
# alongside it (different state dir, different controller endpoint) so
# we can prove registration + reconcile without ripping piraeus out.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blockstor-satellite
  namespace: blockstor-system
---
# Bug 310: the satellite container's image-baked /etc/drbd.d/ hosts a
# single drbd-utils default file (global_common.conf). Mounting a
# hostPath at /etc/drbd.d/ to share rendered .res files with other
# DRBD-aware pods would shadow that file. We re-introduce it from a
# ConfigMap (subPath single-file mount, layered AFTER the hostPath
# bind) so the container still has the global_common.conf drbdadm
# expects on every parse. Contents are the upstream drbd-utils
# trixie default (Bug 310 baseline; intentionally lean — no per-
# resource directives leak into the global scope).
apiVersion: v1
kind: ConfigMap
metadata:
  name: blockstor-satellite-drbd-conf
  namespace: blockstor-system
data:
  global_common.conf: |
    # blockstor satellite — global_common.conf shim (Bug 310).
    # Kept minimal: per-resource tuning lives in the rendered .res
    # files, not here. Mirrors the drbd-utils trixie default.
    global {
        usage-count no;
        udev-always-use-vnr;
    }
    common {
        handlers {}
        startup {}
        options {}
        disk {}
        net {}
    }
---
# The satellite runs c-r reconcilers for ResourceDefinitions /
# Resources / Snapshots / StoragePools and writes node-scoped Status
# back via SSA — it needs full CRUD on blockstor.io CRDs and access
# to Status / Finalizers subresources, same as the controller. Events
# permission is for `EventRecorder` traces from reconcile loops.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: blockstor-satellite
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # Bug 283: enrichNodesWithInternalIP lists corev1.Node to synthesise
  # a k8s-internal NetInterface from each node's InternalIP. Without
  # this RBAC the helper falls back silently to pod-CIDR addresses,
  # peer DRBD connections target unroutable IPs, and no 2-replica RD
  # ever reaches UpToDate. Read-only; the daemonset never mutates
  # corev1.Node.
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [blockstor.io.blockstor.io]
    resources: ["*"]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [blockstor.io.blockstor.io]
    resources: ["*/status", "*/finalizers"]
    verbs: [get, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blockstor-satellite
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: blockstor-satellite
subjects:
  - kind: ServiceAccount
    name: blockstor-satellite
    namespace: blockstor-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: blockstor-satellite
  namespace: blockstor-system
  labels: {app: blockstor-satellite}
spec:
  selector: {matchLabels: {app: blockstor-satellite}}
  template:
    metadata: {labels: {app: blockstor-satellite}}
    spec:
      serviceAccountName: blockstor-satellite
      hostPID: true
      # hostNetwork so the container's hostname matches the Talos node
      # name (drbdadm uses hostname to pick the right `on <node>` block
      # from the .res file). Pod IP equals node IP under hostNetwork,
      # which the satellite Hello flow advertises as its endpoint.
      hostNetwork: true
      # ClusterFirstWithHostNet keeps cluster DNS resolution working
      # under hostNetwork — without it the satellite can't resolve
      # `blockstor-controller.blockstor-system.svc`.
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      # Run only on workers (controlplane has no DRBD extension loaded).
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - {key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}
      # Bug 301: short grace period — no preStop drain. Earlier shapes
      # tried `drbdadm down` / `drbdsetup down` to release DRBD-9
      # connections before SIGTERM, but a peer wedged in `Connecting`
      # leaves the kernel thread in uninterruptible-wait. Even
      # `drbdsetup down --force` blocks on a netlink ack from that
      # thread, so the container went D-state and the pod hung
      # `Terminating` for 11+ minutes — long enough to break
      # rolling-upgrade and any downstream tests that wait for DS
      # rollout. DRBD kernel state is host-scoped (Talos extension), so
      # it survives the pod regardless; the next satellite's
      # cleanKernelState (Bug 285) sweeps it on startup. Letting SIGTERM
      # / SIGKILL reap the pod within 10 s keeps the DS rollout
      # unblocked, which matters more than a clean disconnect.
      terminationGracePeriodSeconds: 10
      containers:
        - name: satellite
          image: __REGISTRY__/blockstor-satellite:dev
          imagePullPolicy: Always
          args:
            # drbd's /etc/drbd.conf includes /etc/drbd.d/*.res, so the
            # satellite writes its rendered files where drbdadm
            # actually looks for them. Bug 310: the directory is now a
            # hostPath bind (volume `drbd-cfg` below) so the rendered
            # .res / .md-created / .mkfs.done state survives a satellite
            # pod restart AND, more importantly, is visible to other
            # DRBD-aware pods on the same node (piraeus-csi-nfs-server,
            # drbd-reactor, ha-controller). Upstream LINSTOR shares
            # exactly the same layout via /var/lib/linstor.d/; we keep
            # the path drbd-utils expects out of the box.
            - --state-dir=/etc/drbd.d
            # Storage pools are declared via StoragePool CRDs in
            # stand/blockstor-storagepools.yaml (Phase 10.5 — the
            # satellite's c-r reconciler picks them up via watch).
            # install-pools.sh on each worker creates the backing
            # VG/zpool/dir before the CRDs reach the satellite.
            # Phase 10.6 retired all gRPC wires — the satellite
            # talks to the controller through the apiserver only,
            # no listen port or controller address needed here.
            # Bug 207: bind health probes on a host-unique port so
            # kubelet livenessProbe / readinessProbe restart wedged
            # satellites instead of letting Node.Online lie via
            # stale heartbeat-reconciler timestamps.
            - --health-probe-bind-address=:9101
          env:
            - name: NODE_NAME
              valueFrom: {fieldRef: {fieldPath: spec.nodeName}}
            - name: POD_IP
              valueFrom: {fieldRef: {fieldPath: status.podIP}}
          ports:
            # Satellite-to-satellite snapshot stream (cross-node clone).
            # The receiving satellite GETs the raw byte stream from a
            # peer that hosts the snapshot locally; without this port
            # open peers see ECONNREFUSED and cross-node clone falls
            # back to DRBD initial-sync. hostNetwork=true means this
            # is the node's real port — must stay outside the DRBD
            # range (7000-7999) and any LINSTOR controller port.
            - name: snap-stream
              containerPort: 9100
              hostPort: 9100
              protocol: TCP
            # Bug 207: kubelet health probe surface. hostNetwork=true
            # exposes this on the node, so the port must be unique
            # across the host (snap-stream:9100, healthz:9101).
            - name: healthz
              containerPort: 9101
              hostPort: 9101
              protocol: TCP
          # Bug 207: liveness/readiness probes hit the c-r manager's
          # /healthz and /readyz endpoints. A wedged satellite stops
          # answering healthz; kubelet restarts the pod, breaking the
          # stale-heartbeat lie where Node.Online stayed true while
          # the satellite was deadlocked.
          livenessProbe:
            httpGet: {path: /healthz, port: healthz}
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /readyz, port: healthz}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            privileged: true
          # Bug 301: no lifecycle.preStop. Earlier shapes (Bug 241 / Bug
          # 298) tried `drbdsetup disconnect --force=yes` + `drbdsetup
          # down` to drain DRBD before SIGTERM, but a peer wedged in
          # `Connecting` parks the kernel thread in uninterruptible-wait
          # and even `drbdsetup down --force` blocks on a netlink ack
          # from that thread. The hook then wedged inside the container,
          # SIGTERM/SIGKILL couldn't reap the D-state process, and the
          # pod hung `Terminating` for 11+ minutes — long enough to
          # break the DS rolling-update path of tests/e2e/rolling-
          # upgrade.sh. DRBD kernel state is host-scoped (Talos
          # extension) and survives the pod regardless, so skipping the
          # in-pod drain costs nothing the host doesn't already own; the
          # next satellite's cleanKernelState (Bug 285, commit
          # a563b1f43) sweeps it on startup. SIGTERM → 10 s → SIGKILL
          # now reliably tears the pod down inside the rollout budget.
          volumeMounts:
            - {name: dev, mountPath: /dev}
            - {name: modules, mountPath: /lib/modules, readOnly: true}
            - {name: lvm-run, mountPath: /run/lvm}
            - {name: state, mountPath: /var/lib/blockstor-satellite}
            - {name: pool, mountPath: /var/lib/blockstor-pool}
            # Bug 310: host-shared /etc/drbd.d/ inside the container,
            # backed by hostPath /var/lib/linstor.d/ on the node — the
            # exact upstream LINSTOR layout. Rendered .res /
            # .md-created / .mkfs.done state lives on the node so every
            # DRBD-aware pod (drbd-reactor, piraeus-csi-nfs-server,
            # ha-controller) reads the same view drbdadm reads. The
            # bind from /var/lib/linstor.d/ to /etc/drbd.d/ is what
            # lets `--state-dir=/etc/drbd.d` keep working — every e2e
            # script that reads /etc/drbd.d/<rd>.res via `kubectl exec`
            # continues to see the same path. /etc is read-only on
            # Talos, so we cannot use /etc/drbd.d/ as the hostPath
            # source.
            - {name: drbd-cfg, mountPath: /etc/drbd.d}
            # Re-introduce the image-baked global_common.conf via
            # subPath, layered on top of the hostPath bind above —
            # without it `drbdadm parse` warns on every invocation
            # ("could not find /etc/drbd.d/global_common.conf"). The
            # ConfigMap content is intentionally lean (drbd-utils
            # trixie default minus the example handlers).
            - name: drbd-global-conf
              mountPath: /etc/drbd.d/global_common.conf
              subPath: global_common.conf
              readOnly: true
            # Bug 305: piraeus-operator's LinstorSatelliteConfiguration
            # registers a FILE_THIN pool named `pool` at
            # /var/lib/piraeus/file-thin (see stand/install-piraeus.sh).
            # blockstor's StoragePoolReconciler instantiates the FILE
            # provider inside this container, so unless this hostPath is
            # mounted here, every PoolStatus probe ENOENTs and the pool
            # flips state=Faulty with 0 KiB free — linstor-csi then
            # refuses to autoplace RWX PVCs against `pool` ("Not enough
            # nodes fulfilling the auto-place criteria"). Mounting the
            # same host directory piraeus's own satellite sees fixes the
            # capacity report and unlocks rwx-ganesha.sh.
            - {name: piraeus-pool, mountPath: /var/lib/piraeus/file-thin}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
        # drbd-reactor: TODO (scenario 7.W08).
        #
        # Upstream LINSTOR's monitoring guide (linstor-kubernetes.adoc
        # §"Configuring monitoring with Prometheus in Operator v2
        # deployments") asks for a per-satellite drbd-reactor container
        # so its `prometheus` plugin can expose per-resource DRBD metrics
        # (replication state, connection state, quorum). PodMonitor +
        # PrometheusRule on the LINBIT side scrape that endpoint.
        #
        # In Cozystack's Talos deployment, drbd-reactor lives in the
        # siderolabs/drbd Talos system extension on the host, not as a
        # sidecar (see PLAN.md "HA failover layer" + "RWX volumes via
        # Ganesha"). That model is required because:
        #   1. drbd-reactor must subscribe to `drbdsetup events2` on the
        #      host kernel module, the same module the satellite uses;
        #   2. it stamps node taints (`drbd.linbit.com/lost-quorum`)
        #      which piraeus-ha-controller consumes — host-scoped
        #      semantics, not pod-scoped.
        # Running it as a sidecar would still work (hostPID is already
        # on) but duplicates state with the host-side extension.
        #
        # For wave2 we pin the contract here: when the Cozystack-side
        # Talos extension is the one shipping drbd-reactor, this
        # DaemonSet stays sidecar-less and the PodMonitor targets the
        # host port that the extension's reactor binds. If/when a
        # downstream chooses the in-pod model instead, drop a
        # `- name: drbd-reactor` container alongside `satellite` with
        # the upstream image + a /etc/drbd-reactor.d ConfigMap mount;
        # no other DaemonSet plumbing change is needed.
      volumes:
        - {name: dev, hostPath: {path: /dev}}
        - {name: modules, hostPath: {path: /lib/modules}}
        - {name: lvm-run, hostPath: {path: /run/lvm, type: DirectoryOrCreate}}
        - {name: state, hostPath: {path: /var/lib/blockstor-satellite, type: DirectoryOrCreate}}
        - {name: pool, hostPath: {path: /var/lib/blockstor-pool, type: DirectoryOrCreate}}
        # Bug 305: shared with piraeus-satellite (LinstorSatellite-
        # Configuration `pool` in stand/install-piraeus.sh). Both
        # satellites must see the same directory or FILE_THIN
        # PoolStatus diverges between piraeus (CRD writer) and
        # blockstor (provider runtime).
        - {name: piraeus-pool, hostPath: {path: /var/lib/piraeus/file-thin, type: DirectoryOrCreate}}
        # Bug 310: host-shared DRBD config dir. Upstream LINSTOR puts
        # rendered .res files on a hostPath so every DRBD-aware pod on
        # the node (drbd-reactor, ha-controller, piraeus-csi-nfs-server)
        # reads the same view drbdadm reads. We use the exact upstream
        # host location (/var/lib/linstor.d/) so a coexisting piraeus-
        # satellite — if anyone ever re-enables its controller — writes
        # into the same directory, and to dodge Talos' read-only /etc.
        # The mount target inside the container is /etc/drbd.d/ (the
        # drbd-utils default include path) so e2e tooling that reads
        # /etc/drbd.d/<rd>.res keeps working through the kubectl exec
        # surface; the satellite's --state-dir still says /etc/drbd.d
        # and the bind takes care of the host-side translation.
        - {name: drbd-cfg, hostPath: {path: /var/lib/linstor.d, type: DirectoryOrCreate}}
        # Bug 310: re-introduce the image-baked global_common.conf via
        # subPath. The hostPath bind above empties /etc/drbd.d/ on
        # first-ever start (DirectoryOrCreate); without this shim
        # drbdadm logs a "no global_common.conf" warning on every
        # invocation and any operator who reads the file out-of-band
        # gets confused.
        - name: drbd-global-conf
          configMap:
            name: blockstor-satellite-drbd-conf
            items:
              - {key: global_common.conf, path: global_common.conf}
