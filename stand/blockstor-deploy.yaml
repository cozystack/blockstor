---
# Standalone deployment of the blockstor controller alongside the
# existing Java LINSTOR. Used by stand smoke tests as the live target
# for our own REST surface; lets us prove our CRDs reconcile and our
# REST server answers without ripping out the Java oracle.
apiVersion: v1
kind: Namespace
metadata:
  name: blockstor-system
  labels:
    # The satellite is privileged + hostNetwork + hostPID + hostPath —
    # required for drbdadm / losetup / cryptsetup against the kernel.
    # The default PodSecurity Restricted profile rejects all of these,
    # so explicitly opt this namespace into the privileged profile.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: blockstor-controller
  namespace: blockstor-system
---
# Cluster-wide read on core API + full RW on our blockstor.io CRDs.
# We don't watch any non-blockstor objects, so the verb set stays narrow.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: blockstor-controller
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [blockstor.io.blockstor.io]
    resources: ["*"]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [blockstor.io.blockstor.io]
    resources: ["*/status", "*/finalizers"]
    verbs: [get, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: blockstor-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: blockstor-controller
subjects:
  - kind: ServiceAccount
    name: blockstor-controller
    namespace: blockstor-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blockstor-controller
  namespace: blockstor-system
  labels: {app: blockstor-controller}
spec:
  replicas: 1
  selector: {matchLabels: {app: blockstor-controller}}
  template:
    metadata: {labels: {app: blockstor-controller}}
    spec:
      serviceAccountName: blockstor-controller
      containers:
        - name: manager
          image: __REGISTRY__/blockstor:dev
          imagePullPolicy: Always
          args:
            # REST API moved to the separate apiserver Deployment
            # (cmd/apiserver) — controller now only runs reconcilers.
            - --enable-rest-api=false
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=0
            - --leader-elect=false
            - --store=k8s
          ports:
            - {name: health, containerPort: 8081}
          readinessProbe:
            httpGet: {path: /readyz, port: 8081}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: 8081}
            initialDelaySeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            seccompProfile: {type: RuntimeDefault}
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 500m, memory: 256Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: blockstor-controller
  namespace: blockstor-system
spec:
  # Selector points at the apiserver pods so existing callers of
  # `blockstor-controller:3370` (linstor-csi, piraeus-operator, the
  # `linstor` CLI port-forward in tests/e2e) keep working without
  # any URL change. The controller Deployment itself no longer
  # serves :3370. The :7000 grpc port is legacy (Phase 10.6
  # retired the gRPC contract); kept on the Service for now since
  # any stale client hitting it gets a clean connection-refused.
  selector: {app: blockstor-apiserver}
  ports:
    - {name: rest, port: 3370, targetPort: 3370}
