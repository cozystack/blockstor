---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - blockstor.io.blockstor.io
  resources:
  - nodes
  - resourcedefinitions
  - resourcegroups
  - resources
  - snapshots
  - storagepools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - blockstor.io.blockstor.io
  resources:
  - nodes/finalizers
  - resourcedefinitions/finalizers
  - resourcegroups/finalizers
  - resources/finalizers
  - snapshots/finalizers
  - storagepools/finalizers
  verbs:
  - update
- apiGroups:
  - blockstor.io.blockstor.io
  resources:
  - nodes/status
  - resourcedefinitions/status
  - resourcegroups/status
  - resources/status
  - snapshots/status
  - storagepools/status
  verbs:
  - get
  - patch
  - update
# Phase 10.4: REST encryption endpoints read+write the cluster passphrase
# from a native Secret rather than the legacy ControllerProps KV bag.
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - blockstor.io.blockstor.io
  resources:
  - controllerconfigs
  verbs:
  - get
  - list
  - watch
