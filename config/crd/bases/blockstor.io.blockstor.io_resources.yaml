---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: resources.blockstor.io.blockstor.io
spec:
  group: blockstor.io.blockstor.io
  names:
    kind: Resource
    listKind: ResourceList
    plural: resources
    singular: resource
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Resource is the Schema for the resources API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Resource
            properties:
              drbdOptions:
                description: |-
                  drbdOptions is the typed DRBD configuration applied to this
                  specific replica. Overrides the parent RD's drbdOptions
                  field-by-field. Rare — most config lives at RD or RG scope.
                  Phase 10.3.
                properties:
                  disk:
                    description: |-
                      disk configures the `disk { ... }` section (on-io-error,
                      activity-log size, resync hints).
                    properties:
                      alExtents:
                        description: |-
                          alExtents is the activity-log size (in extents). Larger values
                          reduce metadata write amplification at the cost of longer
                          resync windows.
                        format: int32
                        type: integer
                      onIoError:
                        description: |-
                          onIOError is the action when the local backing device returns
                          an I/O error. `detach` is the production-safe default — the
                          satellite drops the local replica to Diskless and consumers
                          keep going via the network path.
                        enum:
                        - detach
                        - pass-on
                        - call-local-io-error
                        type: string
                    type: object
                  handlers:
                    additionalProperties:
                      type: string
                    description: |-
                      handlers maps event names to script paths (e.g. fence-peer,
                      before-resync-target). Free-form for now; the rendered .res
                      emits one line per pair under `handlers { }`.
                    type: object
                  net:
                    description: |-
                      net configures the `net { ... }` section of the rendered .res
                      file (replication protocol, secret, dual-primary, after-sb).
                    properties:
                      afterSb0Pri:
                        description: |-
                          afterSb0Pri is the recovery action when DRBD detects split-
                          brain and both sides were Secondary at the time.
                        enum:
                        - disconnect
                        - discard-younger-primary
                        - discard-older-primary
                        - discard-zero-changes
                        - discard-least-changes
                        - discard-local
                        - discard-remote
                        type: string
                      afterSb1Pri:
                        description: afterSb1Pri is the recovery action when one side
                          was Primary.
                        enum:
                        - disconnect
                        - consensus
                        - violently-as0p
                        - discard-secondary
                        - call-pri-lost-after-sb
                        type: string
                      afterSb2Pri:
                        description: |-
                          afterSb2Pri is the recovery action when both sides were Primary
                          (only possible if allow-two-primaries was enabled).
                        enum:
                        - disconnect
                        - violently-as0p
                        - call-pri-lost-after-sb
                        type: string
                      allowTwoPrimaries:
                        description: |-
                          allowTwoPrimaries enables dual-primary mode (live-migration,
                          shared-export NFS Ganesha). Must be paired with consumer-side
                          fencing — DRBD does NOT serialise concurrent writes from two
                          primaries.
                        type: boolean
                      maxBuffers:
                        description: maxBuffers is the maximum number of in-flight
                          network buffers.
                        format: int32
                        type: integer
                      protocol:
                        description: |-
                          protocol picks the DRBD replication protocol. A=async (writer
                          returns once data hits local disk), B=memory-sync (returns on
                          peer ACK after kernel buffer), C=sync (returns on peer disk
                          fsync). DRBD-9 default is C.
                        enum:
                        - A
                        - B
                        - C
                        type: string
                      sharedSecretRef:
                        description: |-
                          sharedSecretRef references a Secret containing the DRBD network
                          authentication shared secret under the key `shared-secret`.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                    type: object
                  peerDevice:
                    description: |-
                      peerDevice configures the `peer-device { ... }` block (per-peer
                      resync rate caps and similar).
                    properties:
                      cMaxRate:
                        description: |-
                          cMaxRate caps the per-peer resync transfer rate. Format
                          matches DRBD: integer + suffix (`100M`, `1G`).
                        type: string
                    type: object
                  resource:
                    description: |-
                      resource configures resource-level `options { ... }` (auto-
                      promote, quorum mode, on-no-quorum action).
                    properties:
                      autoPromote:
                        description: |-
                          autoPromote causes DRBD to promote the resource to Primary
                          automatically when a consumer opens the device, provided no
                          other peer is already Primary. Cluster-wide default true.
                        type: boolean
                      autoTieBreaker:
                        description: |-
                          autoTieBreaker gates auto-creation of a DISKLESS+TIE_BREAKER
                          witness when a parent RD has an even number of diskful
                          replicas and no operator-placed diskless replica. Replaces
                          `Props["DrbdOptions/AutoAddQuorumTiebreaker"]`. nil inherits
                          the cluster-wide default (true). Phase 10.3.
                        type: boolean
                      onNoQuorum:
                        description: |-
                          onNoQuorum is the action when quorum is lost. `io-error`
                          returns EIO to the consumer (drbd-reactor's typical trigger
                          for failover). `suspend-io` blocks I/O until quorum returns
                          (useful for deliberate maintenance windows).
                        enum:
                        - io-error
                        - suspend-io
                        - freeze-io
                        type: string
                      quorum:
                        description: |-
                          quorum picks the quorum policy. `majority` requires more than
                          half of all replicas (including diskless witnesses) to be
                          connected before allowing writes. `off` allows writes from any
                          replica regardless of partition state — split-brain risk.
                          `all` requires every replica to be reachable, useful only for
                          strict 2-replica configurations under deliberate operator
                          control.
                        enum:
                        - "off"
                        - majority
                        - all
                        type: string
                    type: object
                type: object
              extraProps:
                additionalProperties:
                  type: string
                description: |-
                  extraProps carries upstream-LINSTOR property keys we have not
                  yet typed into structured fields. Forward-compat shim populated
                  only by the REST shim when golinstor sends an unknown key.
                  Phase 10.3.
                type: object
              flags:
                description: flags carries the user-controlled placement flags.
                items:
                  type: string
                type: array
              nodeName:
                description: nodeName is the satellite hosting this replica.
                type: string
              props:
                additionalProperties:
                  type: string
                description: props is the LINSTOR per-resource property map.
                type: object
              resourceDefinitionName:
                description: resourceDefinitionName is the parent ResourceDefinition.
                type: string
              storagePool:
                description: |-
                  storagePool is the LINSTOR storage pool name this replica
                  allocates from. Replaces `Spec.Props["StorPoolName"]` (which
                  the dispatcher's buildVolumes already prefers when set).
                  Phase 10.3 step.
                type: string
              volumes:
                description: |-
                  volumes carries per-volume seed configuration that the
                  satellite applies once on first activation of this replica.
                  Today the only field is SeedFromGi (Phase 8.1) — when set,
                  the satellite stamps the new replica's DRBD metadata with
                  this generation identifier before `drbdadm up` so the GI
                  handshake sees the new device as already-in-sync with that
                  peer, skipping the full initial-sync.
                items:
                  description: |-
                    ResourceVolumeSpec is one volume's per-replica configuration knobs.
                    Distinct from ResourceVolumeStatus: this carries one-shot seeding
                    hints the satellite consumes during first activation, the Status
                    counterpart carries observed runtime state.
                  properties:
                    seedFromGi:
                      description: |-
                        seedFromGi pre-seeds the DRBD-9 generation identifier of this
                        replica's metadata block before the first `drbdadm up`. When
                        set to the CurrentGi of an existing UpToDate peer, DRBD's GI
                        handshake on first connect sees the match and skips the full
                        initial-sync — turning hours of resync on multi-TiB volumes
                        into instant. Phase 8.1.

                        Consumed once on first activation; subsequent reconciles
                        ignore it (the satellite checks `drbdmeta show-gi` before
                        re-stamping).
                      type: string
                    volumeNumber:
                      description: |-
                        volumeNumber matches the corresponding ResourceDefinition
                        VolumeDefinition. +required when this struct is populated.
                      format: int32
                      type: integer
                  required:
                  - volumeNumber
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - volumeNumber
                x-kubernetes-list-type: map
            required:
            - nodeName
            - resourceDefinitionName
            type: object
          status:
            description: status defines the observed state of Resource
            properties:
              conditions:
                description: conditions represent the current state of the Resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              connections:
                description: |-
                  connections is the per-peer DRBD connection state observed by the
                  satellite (from `drbdsetup events2` / `drbdsetup status`). The
                  Python `linstor r list --faulty` reads this through the REST
                  `layer_object.drbd.connections` map — without it, the CLI cannot
                  distinguish a healthy three-peer mesh from one with a broken
                  connection. Keyed by peer node name.
                items:
                  description: |-
                    ResourceConnectionStatus is the state of one DRBD peer connection
                    from this replica's point of view. Maps 1:1 to upstream LINSTOR's
                    `DrbdConnection` REST shape — the Python CLI walks the `connected`
                    flag to color the Conns column red on `linstor r list`.
                  properties:
                    connected:
                      description: |-
                        connected is true iff DRBD reports the connection as
                        `Connected` (handshake complete, replication active).
                      type: boolean
                    message:
                      description: |-
                        message is the human-readable DRBD connection state
                        (`Connected`, `StandAlone`, `BrokenPipe`, `NetworkFailure`,
                        `Connecting`, `Timeout`, etc.) as reported by `drbdsetup
                        events2`. Populated even when Connected — useful for
                        surfacing transitional states.
                      type: string
                    peerNodeName:
                      description: |-
                        peerNodeName is the name of the peer Resource (and the node
                        it lives on — Resource names are RD.node).
                      type: string
                  required:
                  - peerNodeName
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - peerNodeName
                x-kubernetes-list-type: map
              drbdMinor:
                description: |-
                  drbdMinor is the local /dev/drbd<N> minor number on the
                  hosting node. Like drbdPort, allocated per-replica from the
                  node's minor-range — minors are local device numbers, so two
                  replicas on different nodes can have unrelated minors.
                format: int32
                type: integer
              drbdNodeId:
                description: |-
                  drbdNodeID is the DRBD-9 node-id assigned to this replica.
                  Allocated once when the Resource first reconciles and never
                  changes for the lifetime of the Resource — re-numbering live
                  replicas would re-map their DRBD bitmaps and corrupt data on
                  peer-to-peer resync. Range 0..15 (drbd-9 max-peers). nil means
                  the controller has not yet allocated.
                format: int32
                type: integer
              drbdPort:
                description: |-
                  drbdPort is the TCP port this replica listens on. Allocated
                  from the hosting node's TCP-port range — different replicas
                  of the same RD can use different ports because each lives on
                  a different node and the port is local to that node. Matches
                  upstream LINSTOR's per-resource (not per-RD) port model.
                  nil means not yet allocated.
                format: int32
                type: integer
              drbdState:
                description: |-
                  drbdState is the current resource-level DRBD state reported by
                  `drbdsetup events2` — `UpToDate`, `Outdated`, `Connected`,
                  `Failed`, etc. Phase 10.2: written by the satellite via the
                  Status subresource so a concurrent Spec mutation
                  (auto-diskful, resize) can't clobber it.
                type: string
              inUse:
                description: inUse is whether DRBD reports the resource as primary
                  anywhere.
                type: boolean
              volumes:
                description: volumes is the per-volume runtime state reported by the
                  satellite.
                items:
                  description: ResourceVolumeStatus is the runtime state of one volume
                    of a Resource.
                  properties:
                    allocatedKib:
                      format: int64
                      type: integer
                    currentGi:
                      description: |-
                        currentGi is the DRBD-9 current generation identifier reported
                        by `drbdsetup events2` for this replica's local volume. The
                        controller reads it when adding a new replica to skip the full
                        initial-sync: pre-seeding the new metadata block with this GI
                        makes DRBD's GI handshake see the new peer as already-in-sync,
                        turning hours of resync on multi-TiB volumes into instant.
                        Updated by the satellite-side observer; never set in Spec.
                      type: string
                    devicePath:
                      type: string
                    diskState:
                      type: string
                    historyGi:
                      description: |-
                        historyGi carries the historical GI chain (DRBD keeps 3-4
                        previous generations). Useful for split-brain forensics and
                        cluster-state UI; may be elided when we run tight on Status
                        budget. Order is newest-first.
                      items:
                        type: string
                      type: array
                    storagePool:
                      type: string
                    usableKib:
                      format: int64
                      type: integer
                    volumeNumber:
                      format: int32
                      type: integer
                  required:
                  - volumeNumber
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - volumeNumber
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
