                x-kubernetes-list-type: map
              connectionStatus:
                description: |-
                  connectionStatus is the satellite connection state reported by the
                  controller (CONNECTED, OFFLINE, …).
                type: string
              flags:
                description: flags computed by the satellite (e.g. EVICTED, EVACUATING).
                items:
                  type: string
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
