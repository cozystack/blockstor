---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: snapshots.blockstor.io.blockstor.io
spec:
  group: blockstor.io.blockstor.io
  names:
    kind: Snapshot
    listKind: SnapshotList
    plural: snapshots
    singular: snapshot
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Snapshot is the Schema for the snapshots API.

          The CEL rule above enforces the cluster-wide naming convention every
          composite-keyed CRD in the project follows: `metadata.name == <rd>.<snap>`.
          Keeping the composite key encoded in the name lets the store's
          `snapshotCRDName` helper round-trip the (rd, snap) pair through k8s
          metadata without a sidecar index, and lets operators grep for
          `<rd>.` across kinds (Resource, Snapshot, StoragePool) to find every
          object bound to one parent. The `optionalOldSelf` escape makes the
          rule create-only — finalizer-strip on a stale-named Snapshot
          (e.g. one created before this marker existed) is never blocked.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Snapshot
            properties:
              nodes:
                description: |-
                  nodes are the satellites the snapshot should live on. Empty means
                  "every node currently hosting the parent resource".
                items:
                  type: string
                type: array
              props:
                additionalProperties:
                  type: string
                description: props is the LINSTOR property map for the snapshot.
                type: object
              resourceDefinitionName:
                description: resourceDefinitionName is the parent ResourceDefinition.
                type: string
              snapshotName:
                description: snapshotName is the user-facing snapshot identifier.
                type: string
              volumeDefinitions:
                description: volumeDefinitions records the size of each volume captured.
                items:
                  description: SnapshotVolumeRef is one volume slot inside a Snapshot.
                  properties:
                    sizeKib:
                      format: int64
                      type: integer
                    volumeNumber:
                      format: int32
                      type: integer
                  required:
                  - sizeKib
                  - volumeNumber
                  type: object
                type: array
            required:
            - resourceDefinitionName
            - snapshotName
            type: object
          status:
            description: status defines the observed state of Snapshot
            properties:
              conditions:
                description: conditions represent the current state of the Snapshot.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              flags:
                description: |-
                  flags carries terminal-state markers. Currently only
                  "FAILED" is meaningful — stamped by the satellite when
                  CreateSnapshot returns a non-retryable error class.
                items:
                  type: string
                type: array
              nodeStatus:
                description: nodeStatus reports per-node readiness from the satellites.
                items:
                  description: |-
                    SnapshotPerNodeStatus is the satellite-reported state of one
                    materialisation of the snapshot.
                  properties:
                    createTimestamp:
                      format: int64
                      type: integer
                    nodeName:
                      type: string
                    ready:
                      type: boolean
                  required:
                  - nodeName
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: metadata.name must equal <spec.resourceDefinitionName>.<spec.snapshotName>
          optionalOldSelf: true
          rule: oldSelf.hasValue() || self.metadata.name == self.spec.resourceDefinitionName
            + '.' + self.spec.snapshotName
    served: true
    storage: true
    subresources:
      status: {}
