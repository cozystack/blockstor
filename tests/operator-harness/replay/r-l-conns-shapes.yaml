name: r-l-conns-shapes
description: |
  Sanity-check the `Conns` column shapes that `linstor r l` renders for
  a healthy resource. Pins the wire shape so any future regression in
  the connections renderer or the events2 stream is detected.

  We do NOT artificially break replication (network partition is owned
  by the dedicated network-fault e2e). We assert the "Ok" / quorum-met
  state on a freshly autoplaced 2-replica RD.

prerequisites:
  min_nodes: 2
  storage_pool: stand

vars:
  sp: stand

steps:
  - name: create-rd
    cmd: ["resource-definition", "create", "{{rd}}"]
    expect_exit: 0
  - name: create-vd
    cmd: ["volume-definition", "create", "{{rd}}", "32M"]
    expect_exit: 0
  - name: auto-place-2
    cmd: ["resource", "create", "--auto-place", "2", "--storage-pool", "{{sp}}", "{{rd}}"]
    expect_exit: 0
    await:
      kind: replica_count
      rd: "{{rd}}"
      min: 2
      timeout_s: 120
  - name: wait-uptodate
    cmd: ["resource", "list", "--resources", "{{rd}}"]
    expect_exit: 0
    await:
      kind: all_uptodate
      rd: "{{rd}}"
      timeout_s: 240
  # `r l` itself just needs to render without crashing python-linstor;
  # status-shape is asserted via the await above.
  - name: r-l-renders
    cmd: ["resource", "list", "--resources", "{{rd}}", "--pastable"]
    expect_exit: 0

teardown:
  - cmd: ["resource-definition", "delete", "{{rd}}"]

invariants:
  - no_orphans
