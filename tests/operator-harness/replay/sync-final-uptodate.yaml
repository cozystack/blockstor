name: sync-final-uptodate
description: |
  Bug-329 catcher. Adding a 3rd diskful replica to a 2-replica RD MUST
  converge to clean `UpToDate` (no `(NN%)` suffix) on every replica
  within 240s. Historically the sync got stuck at `UpToDate(100%)`
  forever — drbdsetup status reported full sync but the events2 stream
  never flipped to clean state.

prerequisites:
  min_nodes: 3
  storage_pool: stand

vars:
  sp: stand

steps:
  - name: create-rd
    cmd: ["resource-definition", "create", "{{rd}}"]
    expect_exit: 0
  - name: create-vd
    cmd: ["volume-definition", "create", "{{rd}}", "32M"]
    expect_exit: 0
  - name: r-c-node1
    cmd: ["resource", "create", "{{node1}}", "{{rd}}", "--storage-pool", "{{sp}}"]
    expect_exit: 0
  - name: r-c-node2
    cmd: ["resource", "create", "{{node2}}", "{{rd}}", "--storage-pool", "{{sp}}"]
    expect_exit: 0
  - name: wait-2-uptodate
    cmd: ["resource", "list", "--resources", "{{rd}}"]
    expect_exit: 0
    await:
      kind: all_uptodate
      rd: "{{rd}}"
      timeout_s: 240
  - name: r-c-node3-add-diskful
    cmd: ["resource", "create", "{{node3}}", "{{rd}}", "--storage-pool", "{{sp}}"]
    expect_exit: 0
  - name: wait-sync-clean
    cmd: ["resource", "list", "--resources", "{{rd}}"]
    expect_exit: 0
    await:
      kind: sync_clean
      rd: "{{rd}}"
      timeout_s: 240

teardown:
  - cmd: ["resource-definition", "delete", "{{rd}}"]

invariants:
  - no_orphans
